<style>
  :root {
    --bdal-red: #8b1e2d;
    --bdal-red-soft: #f7e6e6;
    --bdal-border: #e6e0dc;
    --bdal-border-strong: #d8c8bf;
    --bdal-bg-soft: #fbfaf8;
    --bdal-text: #30343a;
    --bdal-muted: #5b636b;
    --bdal-radius: 6px;
  }

  body {
    color: var(--bdal-text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "Noto Sans SC", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.58;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  h1, h2, h3, h4, h5, h6 {
    letter-spacing: 0;
  }

  .page__content,
  .archive {
    line-height: 1.65;
  }

  .page__content > h1,
  .archive .page__title {
    margin: 1.55rem 0 0.75rem !important;
    padding-bottom: 0.35rem;
    border-bottom: 1px solid #eadfd8;
    color: var(--bdal-text);
    font-size: 1.35rem !important;
    line-height: 1.25;
  }

  .page__content > h2,
  .archive h2 {
    color: var(--bdal-text);
    font-size: 1.22rem;
    line-height: 1.3;
  }

  .page__content p,
  .page__content li,
  .archive p,
  .archive li {
    overflow-wrap: break-word;
  }

  .highlight-grid span,
  .news-card a,
  .news-more-toggle,
  .award-link,
  .publication-toolbar a,
  .publication-links a,
  .publication-years summary,
  .publication-back a,
  .student-jump a {
    display: inline-block;
    border: 1px solid var(--bdal-border-strong) !important;
    border-radius: 999px !important;
    background: #fff !important;
    color: var(--bdal-red) !important;
    font-size: 0.78rem !important;
    font-weight: 700;
    line-height: 1.45;
    text-decoration: none !important;
    white-space: nowrap;
  }

  .highlight-grid a:hover span,
  .news-card a:hover,
  .news-more-toggle:hover,
  .award-link:hover,
  .publication-toolbar a:hover,
  .publication-links a:hover,
  .publication-years summary:hover,
  .publication-back a:hover,
  .student-jump a:hover {
    border-color: #cfa5a5 !important;
    background: var(--bdal-red-soft) !important;
    text-decoration: none !important;
  }

  .news-card,
  .award-card,
  .admission-panel,
  .research-line-card,
  .publication-card,
  .research-stat {
    border-color: var(--bdal-border) !important;
    border-radius: var(--bdal-radius) !important;
  }

  .news-card,
  .award-card--featured,
  .admission-notice,
  .admission-process,
  .research-hero {
    background: var(--bdal-bg-soft) !important;
  }

  .news-card,
  .admission-notice,
  .admission-process,
  .research-hero,
  .publication-card,
  .award-card,
  .research-line-card {
    border-left-color: var(--bdal-red) !important;
  }

  .research-line-card--hilbert {
    border-left-color: #2f6f73 !important;
  }

  .research-line-card--optimal_transport {
    border-left-color: #6d5a9c !important;
  }

  .research-line-card--alignment_ot {
    border-left-color: #2f6073 !important;
  }

  .research-line-card--applications_ai {
    border-left-color: #a07a18 !important;
  }

  .research-line-card--review {
    border-left-color: #64748b !important;
  }

  .research-line-card--other {
    border-left-color: #7a5d4a !important;
  }

  .news-meta,
  .award-meta,
  .publication-authors,
  .publication-note,
  .publication-line-intro,
  .research-hero p,
  .research-line-card p,
  .research-stat span {
    color: var(--bdal-muted) !important;
  }

  .news-emphasis--red {
    color: var(--bdal-red);
  }

  .sidebar .author__urls.social-icons li,
  .sidebar .author__urls.social-icons .author__desktop {
    white-space: normal;
    overflow-wrap: anywhere;
    word-break: break-word;
  }

  @media (min-width: 1024px) {
    .sidebar {
      height: calc(100vh - 2.5rem) !important;
      padding-bottom: 1rem;
      box-sizing: border-box;
    }

    .sidebar .author__urls.social-icons a {
      white-space: normal;
      overflow-wrap: anywhere;
    }
  }

  @media (max-width: 1023px) {
    .sidebar:not(.sidebar--home) {
      display: none !important;
    }

    .sidebar--home {
      float: none !important;
      position: static !important;
      width: 100% !important;
      max-width: none !important;
      height: auto !important;
      margin-bottom: 1em;
      padding-top: 0 !important;
      overflow: visible !important;
    }

    .sidebar--home .author__avatar {
      display: table-cell;
      width: 84px;
      vertical-align: top;
    }

    .sidebar--home .author__avatar img {
      width: 84px;
      height: 84px;
      max-width: 84px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    .sidebar--home .author__content {
      display: table-cell;
      width: auto;
      padding-left: 15px;
      padding-right: 10px;
      vertical-align: top;
    }

    .sidebar--home .author__urls-wrapper {
      display: block;
      width: 100%;
      margin-top: 0.45rem;
      cursor: default;
    }

    .sidebar--home .author__urls-wrapper .btn {
      display: none !important;
    }

    .sidebar--home .author__urls.social-icons {
      display: block !important;
      position: static !important;
      width: 100%;
      margin: 0.45rem 0 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      z-index: auto;
    }

    .sidebar--home .author__urls.social-icons:before,
    .sidebar--home .author__urls.social-icons:after {
      display: none;
    }

    .sidebar--home .author__urls.social-icons li,
    .sidebar--home .author__urls.social-icons .author__desktop {
      display: block;
      margin: 0.12rem 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
  }

  @media (max-width: 720px) {
    .sidebar .author__urls-wrapper {
      display: block;
      width: 100%;
      margin-top: 0.45rem;
      cursor: default;
    }

    .sidebar .author__urls-wrapper .btn {
      display: none !important;
    }

    .sidebar .author__urls.social-icons {
      display: block !important;
      position: static !important;
      width: 100%;
      margin: 0.45rem 0 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      z-index: auto;
    }

    .sidebar .author__urls.social-icons:before {
      display: none;
    }

    .sidebar .author__urls.social-icons li,
    .sidebar .author__urls.social-icons .author__desktop {
      display: block;
      margin: 0.12rem 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .page__content > h1,
    .archive .page__title {
      margin: 1.2rem 0 0.55rem !important;
      font-size: 1.18rem !important;
    }

    .highlight-grid span,
    .news-card a,
    .news-more-toggle,
    .award-link,
    .publication-toolbar a,
    .publication-links a,
    .publication-back a,
    .student-jump a {
      max-width: 100%;
      white-space: normal;
    }
  }
